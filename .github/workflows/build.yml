name: Build erlpack patcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "powershell/**"
      - "run-latest.*"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  powershell-test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Test PowerShell patcher
        shell: powershell
        run: .\powershell\test.ps1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: go.mod
      - run: go test ./...
      - run: go vet ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            binary: erlpack-patcher-windows-x64.exe
            artifact: erlpack-patcher-windows-x64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            binary: erlpack-patcher-macos-x64
            artifact: erlpack-patcher-macos-x64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            binary: erlpack-patcher-macos-arm64
            artifact: erlpack-patcher-macos-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache-dependency-path: go.mod
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.sha }}" -o "dist/${{ matrix.binary }}" ./cmd/erlpack-patcher
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${{ matrix.binary }}" > "dist/${{ matrix.binary }}.sha256"
          else
            shasum -a 256 "dist/${{ matrix.binary }}" > "dist/${{ matrix.binary }}.sha256"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - powershell-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: erlpack-patcher-*
          path: release
          merge-multiple: true
      - name: Add launcher scripts
        run: |
          cp run-latest.ps1 release/run-latest.ps1
          cp run-latest.sh release/run-latest.sh
          cp powershell/patcher.ps1 release/patcher.ps1
          sha256sum release/patcher.ps1 > release/patcher.ps1.sha256
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* --generate-notes --verify-tag
          fi
