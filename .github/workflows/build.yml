name: Build erlpack patcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "powershell/**"
      - "shell/**"
      - "run-latest.*"
      - "docs/**"
      - ".github/workflows/build.yml"

permissions:
  contents: read

jobs:
  powershell-test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Test PowerShell patcher
        shell: powershell
        run: .\powershell\test.ps1

  shell-test:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Test shell patcher
        run: sh shell/test.sh

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - powershell-test
      - shell-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Add launcher scripts
        run: |
          mkdir -p release
          cp run-latest.ps1 release/run-latest.ps1
          cp run-latest.sh release/run-latest.sh
          cp powershell/patcher.ps1 release/patcher.ps1
          cp shell/patcher.sh release/patcher.sh
          sha256sum release/patcher.ps1 > release/patcher.ps1.sha256
          sha256sum release/patcher.sh > release/patcher.sh.sha256
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* --generate-notes --verify-tag
          fi
